<app-sidebar [isOpen]="isSidebarOpen" (closeSidebar)="isSidebarOpen = false"></app-sidebar>

<div class="main-layout" [class.sidebar-open]="isSidebarOpen">
  <header class="app-header-bar">
    <button class="hamburger-menu" (click)="toggleSidebar()" [class.active]="isSidebarOpen">
      {{ isSidebarOpen ? '✕' : '☰' }}
    </button>
    <app-header></app-header>
  </header>

  <nav>
    <app-navbar></app-navbar>
  </nav>

  <main class="content-area">
    <router-outlet></router-outlet>
  </main>

  <footer>
    <app-footer></app-footer>
  </footer>
</div>
